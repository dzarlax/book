{{define "admin_hours.html"}}
{{template "head" .}}

<header class="header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
            <h1 class="header__title">Working Hours</h1>
            <p class="header__subtitle">Set your availability for each day of the week</p>
        </div>
        {{template "theme_toggle"}}
    </div>
</header>

{{template "admin_nav" "hours"}}

<div class="card" style="max-width:520px">
    <form hx-post="/admin/hours">
        {{range .Days}}
        <div class="wh-day {{if not .Active}}wh-day--off{{end}}">
            <div class="wh-day__header">
                <input type="checkbox" name="active_{{.DayOfWeek}}" class="toggle" {{if .Active}}checked{{end}}
                       onchange="this.closest('.wh-day').classList.toggle('wh-day--off', !this.checked)">
                <span class="wh-day__name">{{dayName .DayOfWeek}}</span>
            </div>
            <div class="wh-day__times">
                <input type="text" name="start_{{.DayOfWeek}}" value="{{.StartTime}}"
                       class="wh-time" placeholder="09:00" pattern="[0-2][0-9]:[0-5][0-9]" maxlength="5">
                <span class="wh-sep">&ndash;</span>
                <input type="text" name="end_{{.DayOfWeek}}" value="{{.EndTime}}"
                       class="wh-time" placeholder="17:00" pattern="[0-2][0-9]:[0-5][0-9]" maxlength="5">
            </div>
        </div>
        {{end}}
        <div style="margin-top:24px">
            <button type="submit" class="btn btn--primary">Save Hours</button>
        </div>
    </form>
</div>

{{template "foot" .}}
{{end}}
