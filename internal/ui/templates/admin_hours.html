{{define "admin_hours.html"}}
{{template "head" .}}

<header class="header">
    <h1 class="header__title">Working Hours</h1>
    <p class="header__subtitle">Set your availability for each day of the week</p>
</header>

{{template "admin_nav" "hours"}}

<div class="card">
    <form hx-post="/admin/hours">
        <div class="hours-grid">
            {{range .Days}}
            <div class="hours-row">
                <label>{{dayName .DayOfWeek}}</label>
                <input type="checkbox" name="active_{{.DayOfWeek}}" class="toggle" {{if .Active}}checked{{end}}>
                <input type="time" name="start_{{.DayOfWeek}}" value="{{.StartTime}}">
                <input type="time" name="end_{{.DayOfWeek}}" value="{{.EndTime}}">
            </div>
            {{end}}
        </div>
        <div style="margin-top:24px">
            <button type="submit" class="btn btn--primary">Save Hours</button>
        </div>
    </form>
</div>

{{template "foot" .}}
{{end}}
