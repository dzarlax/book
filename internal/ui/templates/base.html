{{define "head"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dzarlax/design-system@main/dist/dzarlax.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
<div class="container{{.ContainerClass}}">
{{end}}

{{define "foot"}}
    <footer class="footer">
        Powered by Dzarlax
    </footer>
</div>
<script>
    const dm = localStorage.getItem('dark-mode');
    if (dm === 'true' || (!dm && matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('dark-mode', '');
    }
    function toggleDarkMode() {
        const on = document.documentElement.hasAttribute('dark-mode');
        if (on) {
            document.documentElement.removeAttribute('dark-mode');
            localStorage.setItem('dark-mode', 'false');
        } else {
            document.documentElement.setAttribute('dark-mode', '');
            localStorage.setItem('dark-mode', 'true');
        }
    }
</script>
</body>
</html>
{{end}}

{{define "theme_toggle"}}
<button class="theme-toggle" onclick="toggleDarkMode()" aria-label="Toggle dark mode">
    <span>&#9790;</span>
</button>
{{end}}
