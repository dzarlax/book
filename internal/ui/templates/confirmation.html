{{define "confirmation.html"}}
{{template "head" .}}

<div class="empty-state">
    <div class="empty-state__icon empty-state__icon--success">&#10003;</div>
    <h1 class="empty-state__title">You're booked!</h1>
    <p class="empty-state__text">
        Your meeting has been confirmed. You'll receive a calendar invite shortly.
    </p>
    <div style="margin-top:32px">
        <a href="/" class="btn btn--secondary">Book another meeting</a>
    </div>
</div>

{{template "foot" .}}
{{end}}
