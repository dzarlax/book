{{define "meeting.html"}}
{{template "head" .}}

<header class="header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
            <a href="/" style="text-decoration:none;color:var(--text-tertiary);font-size:0.85rem">&larr; Back</a>
            <h1 class="header__title">{{.Meeting.Title}}</h1>
            {{if .Meeting.Description}}
            <p class="header__subtitle">{{.Meeting.Description}}</p>
            {{end}}
        </div>
        {{template "theme_toggle"}}
    </div>
    <div class="card__meta" style="margin-top:12px">
        <span>{{.Meeting.DurationMin}} min</span>
    </div>
</header>

<div class="booking-controls">
    <div class="form-row">
        <div class="form-group">
            <label for="date-picker">Date</label>
            <input type="date" id="date-picker" name="date" value="{{.Today}}" min="{{.Today}}"
                   hx-get="/{{.Meeting.Slug}}/slots"
                   hx-target="#slots-container"
                   hx-include="[name='tz']"
                   hx-trigger="change"
                   hx-indicator="#slots-loading">
        </div>
        <div class="form-group">
            <label for="guest-tz">Timezone</label>
            <select name="tz" id="guest-tz"
                    hx-get="/{{.Meeting.Slug}}/slots"
                    hx-target="#slots-container"
                    hx-include="[name='date']"
                    hx-trigger="change">
            </select>
        </div>
    </div>
    <span class="htmx-indicator" id="slots-loading"><span class="spinner"></span></span>
</div>

<div id="slots-container">
    <p style="color:var(--text-tertiary)">Select a date to see available times.</p>
</div>

<div id="booking-form" style="display:none;margin-top:32px">
    <h3 style="margin-bottom:16px;font-weight:600">Your details</h3>
    <form hx-post="/{{.Meeting.Slug}}/book" hx-include="[name='tz']">
        <input type="hidden" name="start" id="selected-start">
        <div class="form-row">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Your name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
        </div>
        <button type="submit" class="btn btn--primary btn--block">Confirm Booking</button>
    </form>
</div>

<script>
(function() {
    var detected = Intl.DateTimeFormat().resolvedOptions().timeZone;
    var zones = [
        "Europe/London", "Europe/Berlin", "Europe/Paris", "Europe/Madrid",
        "Europe/Rome", "Europe/Belgrade", "Europe/Sofia", "Europe/Moscow", "Europe/Istanbul",
        "America/New_York", "America/Chicago", "America/Denver", "America/Los_Angeles",
        "America/Sao_Paulo", "Asia/Dubai", "Asia/Kolkata", "Asia/Singapore", "Asia/Shanghai",
        "Asia/Tokyo", "Asia/Seoul", "Australia/Sydney", "Pacific/Auckland",
        "UTC"
    ];
    if (zones.indexOf(detected) === -1) {
        zones.unshift(detected);
    }
    var sel = document.getElementById('guest-tz');
    zones.forEach(function(tz) {
        var opt = document.createElement('option');
        opt.value = tz;
        opt.textContent = tz.replace(/_/g, ' ');
        if (tz === detected) opt.selected = true;
        sel.appendChild(opt);
    });
    document.addEventListener('DOMContentLoaded', function() {
        htmx.trigger(document.getElementById('date-picker'), 'change');
    });
})();
</script>

{{template "foot" .}}
{{end}}
